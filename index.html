<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petualangan Ular Tangga Matematika</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-area" aria-label="Area permainan">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Belajar sambil bermain</p>
            <h1>Ular Tangga Matematika</h1>
            <p class="developer-credit">Created by Lily Henndria</p>
          </div>
          <button class="icon-button" id="resetButton" type="button" title="Mulai ulang permainan" aria-label="Mulai ulang permainan">
            R
          </button>
        </header>

        <div class="board-wrap">
          <div class="board" id="board" aria-label="Papan ular tangga dari angka 1 sampai 100">
            <svg class="board-art" id="boardArt" viewBox="0 0 1000 1000" aria-hidden="true"></svg>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Panel kontrol permainan">
        <section class="score-panel">
          <div class="player-card active" id="playerOneCard">
            <span class="player-token token-one"></span>
            <div>
              <p>Pemain 1</p>
              <strong id="playerOnePosition">Kotak 1</strong>
            </div>
          </div>
          <div class="player-card" id="playerTwoCard">
            <span class="player-token token-two"></span>
            <div>
              <p>Pemain 2</p>
              <strong id="playerTwoPosition">Kotak 1</strong>
            </div>
          </div>
        </section>

        <section class="control-panel">
          <p class="turn-label" id="turnLabel">Giliran Pemain 1</p>
          <button class="dice-button" id="rollButton" type="button">
            <span class="dice-cube" id="diceFace" data-value="1" aria-label="Dadu menunjukkan angka 1">
              <span class="pip pip-1"></span>
              <span class="pip pip-2"></span>
              <span class="pip pip-3"></span>
              <span class="pip pip-4"></span>
              <span class="pip pip-5"></span>
              <span class="pip pip-6"></span>
              <span class="pip pip-7"></span>
              <span class="pip pip-8"></span>
              <span class="pip pip-9"></span>
            </span>
            Lempar Dadu
          </button>
          <p class="status-text" id="statusText">Jawab soal dengan benar setelah dadu dilempar agar bidak bisa maju.</p>
        </section>

        <section class="question-card" id="questionCard" hidden>
          <p class="question-topic" id="questionTopic">Matematika</p>
          <h2 id="questionText">Berapa hasilnya?</h2>
          <div class="answers" id="answers"></div>
        </section>

        <section class="legend-panel">
          <div>
            <span class="legend ladder"></span>
            Tangga: naik lebih cepat
          </div>
          <div>
            <span class="legend snake"></span>
            Ular: turun dan coba lagi
          </div>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
